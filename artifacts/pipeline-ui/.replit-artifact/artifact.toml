kind = "web"
previewPath = "/"
title = "WEBSPACEAI Dataset Engine"
version = "1.0.0"
id = "artifacts/pipeline-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25288

[services.development]
run = "pnpm --filter @workspace/pipeline-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pipeline-ui", "run", "build" ]
publicDir = "artifacts/pipeline-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25288"
BASE_PATH = "/"

[[services]]
name = "pipeline-api"
paths = [ "/pipeline" ]
localPort = 8000

[services.development]
run = "cd artifacts/pipeline-api && PIPELINE_PORT=8000 python3 -m uvicorn main:app --host 0.0.0.0 --port 8000"

[services.production]

[services.production.run]
args = ["python3", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--app-dir", "artifacts/pipeline-api"]

[services.production.run.env]
PIPELINE_PORT = "8000"

[services.production.health.startup]
path = "/pipeline/healthz"
